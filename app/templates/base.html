<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketHub</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <link
      rel="stylesheet"
      href="{{ url_for('login.static', filename='css/styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('login.static', filename='css/base.css') }}"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    {% block styles %}{% endblock %}
  </head>
  <body>
    {% block header %} {% include 'header.html' %} {% endblock %}

    <main class="page-content">{% block content required %}{% endblock %}</main>

    {% block footer %} {% include 'footer.html' %} {% endblock %}
    <script src="{{ url_for('login.static', filename='js/base.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
